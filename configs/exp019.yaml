exp_id: exp019
description: "CatBoost on kitchen-sink v3 features (incl. 4 text OOFs) — algorithmic diversity at the strongest feature set"
model: catboost
model_params_file: artifacts/params_exp019.json   # HPO-best params from the first run — no re-search
features:
  tabular_fe: true
  target_encoding: true
  text_classic: true
  ridge_meta: true
  embeddings: { model: intfloat/multilingual-e5-large, svd: 64, knn: [5, 25] }
  extra_oof_features: { bert_pred: exp009, bert_pred2: exp014, xlmr_pred: exp012, xlmr_pred2: exp015 }
target_transform: none
sample_weighting: none
n_seeds: 3                           # seed-average the heaviest blend member (was 1)
model_params: {}
hpo: { trials: 0, timeout: null }    # params come from the file above
